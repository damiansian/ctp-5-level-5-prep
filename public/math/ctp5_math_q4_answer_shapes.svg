<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <!-- A. Acute/equilateral triangle -->
  <text x="120" y="40" text-anchor="middle" dominant-baseline="central" style="fill:rgb(31, 41, 55);stroke:none;color:rgb(31, 41, 55);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">A.</text>
  <polygon points="120,55 60,175 180,175" fill="none" stroke="var(--p)" stroke-width="1.5" stroke-linejoin="round" style="fill:none;stroke:rgb(31, 41, 55);color:rgb(31, 41, 55);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- B. Trapezoid (wider base, narrower top, no right angles) -->
  <text x="370" y="40" text-anchor="middle" dominant-baseline="central" style="fill:rgb(31, 41, 55);stroke:none;color:rgb(31, 41, 55);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">B.</text>
  <polygon points="330,55 410,55 450,175 290,175" fill="none" stroke="var(--p)" stroke-width="1.5" stroke-linejoin="round" style="fill:none;stroke:rgb(31, 41, 55);color:rgb(31, 41, 55);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- C. Pentagon (regular, no perpendicular lines) -->
  <text x="120" y="260" text-anchor="middle" dominant-baseline="central" style="fill:rgb(31, 41, 55);stroke:none;color:rgb(31, 41, 55);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">C.</text>
  <polygon points="120,275 178,317 156,385 84,385 62,317" fill="none" stroke="var(--p)" stroke-width="1.5" stroke-linejoin="round" style="fill:none;stroke:rgb(31, 41, 55);color:rgb(31, 41, 55);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- D. Right triangle (has perpendicular lines at the right angle) -->
  <text x="370" y="260" text-anchor="middle" dominant-baseline="central" style="fill:rgb(31, 41, 55);stroke:none;color:rgb(31, 41, 55);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">D.</text>
  <polygon points="310,470 310,290 450,470" fill="none" stroke="var(--p)" stroke-width="1.5" stroke-linejoin="round" style="fill:none;stroke:rgb(31, 41, 55);color:rgb(31, 41, 55);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Right angle indicator (small square in corner) -->
  <polyline points="330,470 330,450 310,450" fill="none" stroke="var(--p)" stroke-width="1" style="fill:none;stroke:rgb(31, 41, 55);color:rgb(31, 41, 55);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>
