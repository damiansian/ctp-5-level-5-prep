<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-labelledby="title desc">
  <title id="title">October calendar with rainy days</title>
  <desc id="desc">An October calendar with rainy days marked by red X symbols on the 2nd, 5th, 8th, 10th, 13th, 17th, 19th, 22nd, 24th, and 27th.</desc>
