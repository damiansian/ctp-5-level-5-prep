<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300" role="img" aria-labelledby="title desc">
  <title id="title">Rectangle with shaded strip and white region</title>
  <desc id="desc">Rectangle ABCD with height 8 units, a shaded strip on the left, and a white region labeled 168 square units.</desc>
  <rect width="600" height="300" fill="#f7f7f5"/>
  <g fill="none" stroke="#333" stroke-width="3">
    <rect x="70" y="52" width="420" height="136"/>
    <rect x="70" y="52" width="52" height="136" fill="#c8c8c8"/>
  </g>
  <text x="49" y="44" font-family="Georgia, serif" font-size="18" fill="#222" font-style="italic">A</text>
  <text x="498" y="44" font-family="Georgia, serif" font-size="18" fill="#222" font-style="italic">B</text>
  <text x="49" y="208" font-family="Georgia, serif" font-size="18" fill="#222" font-style="italic">D</text>
  <text x="498" y="208" font-family="Georgia, serif" font-size="18" fill="#222" font-style="italic">C</text>
  <text x="5" y="126" font-family="Georgia, serif" font-size="18" fill="#222">8 units</text>
  <text x="250" y="126" font-family="Georgia, serif" font-size="18" fill="#777">168 sq. units</text>
  <text x="180" y="245" font-family="Arial, sans-serif" font-size="16" fill="#777">(Figure not drawn to scale)</text>
</svg>
