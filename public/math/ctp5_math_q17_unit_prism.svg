<svg width="100%" viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="rgb(31, 41, 55)" stroke-width="1.25">
    <!-- front face grid -->
    <rect x="120" y="140" width="120" height="120" />
    <line x1="160" y1="140" x2="160" y2="260" />
    <line x1="200" y1="140" x2="200" y2="260" />
    <line x1="120" y1="180" x2="240" y2="180" />
    <line x1="120" y1="220" x2="240" y2="220" />

    <!-- top face -->
    <polygon points="120,140 240,140 420,50 300,50" />
    <line x1="160" y1="140" x2="340" y2="50" />
    <line x1="200" y1="140" x2="380" y2="50" />
    <line x1="150" y1="125" x2="330" y2="35" />
    <line x1="180" y1="110" x2="360" y2="20" />
    <line x1="210" y1="95" x2="390" y2="5" />

    <!-- side face -->
    <polygon points="240,140 420,50 420,170 240,260" />
    <line x1="240" y1="180" x2="420" y2="90" />
    <line x1="240" y1="220" x2="420" y2="130" />
    <line x1="270" y1="125" x2="270" y2="245" />
    <line x1="300" y1="110" x2="300" y2="230" />
    <line x1="330" y1="95" x2="330" y2="215" />
    <line x1="360" y1="80" x2="360" y2="200" />
    <line x1="390" y1="65" x2="390" y2="185" />
  </g>
</svg>
